<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Appointment Booking</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 15px;
    }
    .slot {
      padding: 10px;
      text-align: center;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #ccc;
    }
    .available {
      background-color: #d4f8d4;
    }
    .full {
      background-color: #f8d4d4;
      cursor: not-allowed;
    }
    .confirm-btn {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    .confirm-btn:hover {
      background-color: #0056b3;
    }
	.slot.selected {
  background-color: #007bff;
  color: white;
  border: 1px solid #0056b3;
}

  </style>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const confirmBtn = document.querySelector('.confirm-btn');
    const slots = document.querySelectorAll('.slot.available');
	document.querySelectorAll('.slot.available').forEach(slot => {
  slot.addEventListener('click', () => {
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
    slot.classList.add('selected');
  });
});

    // Slot selection logic
    slots.forEach(slot => {
      slot.addEventListener('click', () => {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
        slot.classList.add('selected');
      });
    });

    // Confirm button logic
    confirmBtn.addEventListener('click', () => {
      const section = document.getElementById('section').value;
      const type = document.getElementById('type').value;
      const date = document.getElementById('date').value;
      const slot = document.querySelector('.slot.available.selected')?.textContent;

      if (!section || !type || !date || !slot) {
        alert("Please fill all fields and select a time slot.");
        return;
      }

      localStorage.setItem('appointmentSection', section);
      localStorage.setItem('appointmentType', type);
      localStorage.setItem('appointmentDate', date);
      localStorage.setItem('appointmentSlot', slot);

      window.location.href = 'confirmation.html';
    });
  });
</script>

</head>
<body>
  <div class="container">
    <h2>Book an Appointment</h2>

    <!-- Section Selection -->
    <label for="section">Select Section</label>
    <select id="section">
      <option value="">-- Choose Section --</option>
      <option value="tiles">Tiles</option>
      <option value="kitchen">Kitchen</option>
      <option value="wardrobe">Wardrobe</option>
      <option value="flooring">Flooring</option>
      <option value="lighting">Lighting</option>
    </select>

    <!-- Appointment Type -->
    <label for="type">Appointment Type</label>
    <select id="type">
      <option value="">-- Choose Type --</option>
      <option value="virtual">Virtual</option>
      <option value="inperson">In-Person</option>
    </select>

    <!-- Date Picker -->
    <label for="date">Date</label>
    <input type="date" id="date">

    <!-- Time Slots -->
    <label>Available Time Slots</label>
    <div class="slot-grid">
      <div class="slot available">10:00 – 11:00</div>
      <div class="slot available">11:00 – 12:00</div>
      <div class="slot full">12:00 – 13:00</div>
      <div class="slot available">13:00 – 14:00</div>
      <div class="slot full">14:00 – 15:00</div>
      <div class="slot available">15:00 – 16:00</div>
      <div class="slot available">16:00 – 17:00</div>
      <div class="slot full">17:00 – 18:00</div>
      <div class="slot available">18:00 – 19:00</div>
    </div>

    <!-- Confirm Button -->
    <button class="confirm-btn">Confirm Appointment</button>
  </div>
</body>
</html>
